  const v = scaleMode === 'japan' ? area / JAPAN_AREA : area;

}

function buildUI() {

  const fb = document.getElementById('filter-btns');
  fb.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px;align-items:center;';
  Object.entries(COLORS).forEach(([r,c]) => {
    const cnt = RAW.filter(d=>d.r===r).length;
    const btn = document.createElement('button');
    btn.className = 'fbtn';
    btn.textContent = r + ' ' + cnt;
    btn.style.background = c+'28'; btn.style.color = c;
    btn.style.boxShadow = '0 0 0 1.5px '+c;
    btn.onclick = () => {
      if (activeRegions.has(r) && activeRegions.size > 1) activeRegions.delete(r);
      else activeRegions.add(r);
      btn.style.background = activeRegions.has(r) ? c+'28' : '#111827';
      btn.style.color      = activeRegions.has(r) ? c : '#4b5563';
      btn.style.boxShadow  = activeRegions.has(r) ? '0 0 0 1.5px '+c : '0 0 0 1px #1f2937';
      draw();
    };
    fb.appendChild(btn);
  });

  // スケールボタン
  const sb = document.getElementById('scale-btns');
  sb.style.cssText = 'display:flex;gap:4px;align-items:center;';
  [['km2','📏 km² 実数'],['japan','🇯🇵 日本＝1.0 倍率']].forEach(([mode,label]) => {
    const btn = document.createElement('button');
    btn.className = 'tbtn';
    btn.id = 'tbtn_'+mode;
    btn.textContent = label;
    btn.style.background = scaleMode===mode ? '#3b82f6' : '#1e293b';
    btn.style.color      = scaleMode===mode ? '#fff'    : '#64748b';
    btn.onclick = () => {
      scaleMode = mode;
      document.querySelectorAll('.tbtn').forEach(b => {
        b.style.background = b.id==='tbtn_'+mode ? '#3b82f6' : '#1e293b';
        b.style.color      = b.id==='tbtn_'+mode ? '#fff'    : '#64748b';
      });
      draw();
    };
    sb.appendChild(btn);
  });

  // 地域参照ボタン
  const rb = document.getElementById('region-btns');
  const lbl = document.createElement('span');
  lbl.textContent = '🗾 参照線:';
  lbl.style.cssText = 'font-size:10px;color:#64748b;';
  rb.appendChild(lbl);
  JP_REGIONS.forEach(reg => {
    const btn = document.createElement('button');
    btn.className = 'rbtn';
    btn.id = 'rbtn_'+reg.name;
    btn.textContent = reg.name;
    btn.style.background = '#1e293b'; btn.style.color = '#64748b';
    btn.onclick = () => {
      if (activeJpRegions.has(reg.name)) {
        activeJpRegions.delete(reg.name);
        btn.style.background = '#1e293b'; btn.style.color = '#64748b';
        btn.style.boxShadow = 'none';
      } else {
        activeJpRegions.add(reg.name);
        btn.style.background = '#ff2d5528'; btn.style.color = '#ff2d55';
        btn.style.boxShadow = '0 0 0 1.5px #ff2d55';
      }
      draw();
    };
    rb.appendChild(btn);
  });

  // 凡例
  const leg = document.getElementById('legend');
  Object.entries(COLORS).forEach(([r,c]) => {
    const d = document.createElement('div'); d.className = 'leg';
    d.innerHTML = '<div class="dot" style="background:'+c+'"></div>'+r;
    leg.appendChild(d);
  });
  const jd = document.createElement('div'); jd.className = 'leg';
  jd.innerHTML = '<span style="color:#ff2d55;font-size:13px;">★</span>&nbsp;日本';
  leg.appendChild(jd);
}

// ---- 描画 ----
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let PAD = { left:68, right:20, top:20, bottom:52 };

function resize() {
  const area = document.getElementById('chart-area');
  canvas.width  = area.clientWidth;
  canvas.height = area.clientHeight;
  draw();
}

function toPixel(lx, ly) {
  const W = canvas.width  - PAD.left - PAD.right;
  const H = canvas.height - PAD.top  - PAD.bottom;
  const px = PAD.left + (lx - xMin()) / (xMax() - xMin()) * W;
  const py = canvas.height - PAD.bottom - (ly - Y_MIN) / (Y_MAX - Y_MIN) * H;
  return [px, py];
}

function drawAxes() {
  const W = canvas.width  - PAD.left - PAD.right;
  const H = canvas.height - PAD.top  - PAD.bottom;
  ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;

  // X軸グリッド・目盛り
  const xSteps = Math.round(xMax()) - Math.round(xMin());
  for (let i = 0; i <= xSteps; i++) {
    const lx = Math.round(xMin()) + i;
    if (lx < xMin() || lx > xMax()) continue;
    const [px] = toPixel(lx, Y_MIN);
    ctx.beginPath(); ctx.moveTo(px, PAD.top); ctx.lineTo(px, canvas.height - PAD.bottom); ctx.stroke();
    // ラベル
    ctx.fillStyle = '#475569'; ctx.font = '9px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    const r = Math.pow(10, lx);
    let label;
    if (scaleMode === 'japan') {
      if (r >= 10)      label = r.toFixed(0)+'×';
      else if (r >= 1)  label = r.toFixed(1)+'×';
      else {
        const pct = r*100;
        if (pct >= 1)        label = pct.toFixed(0)+'%';
        else if (pct >= 0.01) label = pct.toFixed(2)+'%';
        else                  label = pct.toFixed(4)+'%';
      }
    } else {
      label = r>=1e6?(r/1e6).toFixed(0)+'M':r>=1000?(r/1000).toFixed(0)+'k':r.toFixed(0);
    }
    ctx.fillText(label, px, canvas.height - PAD.bottom + 4);
  }

  // Y軸グリッド・目盛り
  for (let ly = Math.ceil(Y_MIN); ly <= Math.floor(Y_MAX); ly++) {
    const [, py] = toPixel(xMin(), ly);
    ctx.beginPath(); ctx.moveTo(PAD.left, py); ctx.lineTo(canvas.width - PAD.right, py); ctx.stroke();
    ctx.fillStyle = '#475569'; ctx.font = '9px sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    const pop = Math.pow(10, ly);
    const label = pop>=1e6?(pop/1e6).toFixed(0)+'億':pop>=1e3?(pop/1e3).toFixed(0)+'百万':pop.toFixed(0)+'千';
    ctx.fillText(label, PAD.left - 4, py);
  }

  // 軸線
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 1.5;
  ctx.strokeRect(PAD.left, PAD.top, W, H);

  // 軸タイトル
  ctx.fillStyle = '#475569'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(scaleMode==='japan'?'面積（日本＝1.0）— 対数スケール':'面積 (km²) — 対数スケール',
               PAD.left + W/2, canvas.height - 8);
  ctx.save(); ctx.translate(12, PAD.top + H/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('人口（千人）— 対数スケール', 0, 0); ctx.restore();
}

function drawPoints() {
  const search = document.getElementById('search').value.trim();

  // 全国を表示（地域フィルターのみ適用）
  RAW.forEach(d => {
    if (d.n === '日本') return;
    if (!activeRegions.has(d.r)) return;
    const lx = xVal(d.a);
    const ly = Math.log10(Math.max(d.p, 0.5));
    if (lx < xMin() || lx > xMax() || ly < Y_MIN || ly > Y_MAX) return;
    const [px, py] = toPixel(lx, ly);

    const isMatch = search !== '' && d.n.includes(search);
    const isSearching = search !== '';

    const isSelected = selectedCountries.has(d.n);

    if (isSelected) {
      // クリック選択：常に強調表示＋国名ラベル
      ctx.beginPath();
      ctx.arc(px, py, 5, 0, Math.PI*2);
      ctx.fillStyle = COLORS[d.r];
      ctx.fill();
      ctx.font = 'bold 11px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#00000088';
      ctx.shadowBlur = 3;
      ctx.fillText(d.n, px+10, py);
      ctx.shadowBlur = 0;
    } else if (isMatch) {
      // 検索一致：点滅（大きめ・明るく）
      if (blinkOn) {
        ctx.beginPath();
        ctx.arc(px, py, 5, 0, Math.PI*2);
        ctx.fillStyle = COLORS[d.r];
        ctx.fill();
        ctx.font = 'bold 11px sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(d.n, px+10, py);
      }
    } else {
      // 通常表示
      ctx.beginPath();
      ctx.arc(px, py, 5, 0, Math.PI*2);
      ctx.fillStyle = COLORS[d.r]+'bb';
      ctx.fill();
    }
  });
}

function drawJapan() {
  const japan = RAW.find(d=>d.n==='日本');
  if (!japan) return;
  if (!activeRegions.has('アジア')) return;
  const [px, py] = toPixel(xVal(japan.a), Math.log10(japan.p));
  const isSelected = selectedCountries.has('日本');
  ctx.font = 'bold 22px serif';
  ctx.fillStyle = '#ff2d55';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#ff2d5588'; ctx.shadowBlur = 8;
  ctx.fillText('★', px, py);
  ctx.shadowBlur = 0;
  if (isSelected) {
    ctx.font = 'bold 11px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#00000088'; ctx.shadowBlur = 3;
    ctx.fillText('日本', px+14, py);
    ctx.shadowBlur = 0;
  }
}

function drawJapanLine() {
  if (scaleMode !== 'japan') return;
  const [px] = toPixel(0, Y_MIN);
  ctx.save();
  ctx.setLineDash([5,4]);
  ctx.strokeStyle = '#ff2d5577'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(px, PAD.top); ctx.lineTo(px, canvas.height - PAD.bottom); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#ff2d55aa'; ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('日本', px, PAD.top + 2);
  ctx.restore();
}

function drawJpRegions() {
  activeJpRegions.forEach(name => {
    const reg = JP_REGIONS.find(r=>r.name===name);
    if (!reg) return;
    const lx = xVal(reg.area);
    const ly = Math.log10(Math.max(reg.pop, 0.5));
    const [rx, ry] = toPixel(lx, ly);

    // 縦点線（日本スケール時のみ）
    if (scaleMode === 'japan') {
      ctx.save();
      ctx.setLineDash([4,3]);
      ctx.strokeStyle = '#ff2d5599'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(rx, PAD.top); ctx.lineTo(rx, canvas.height - PAD.bottom); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#ff2d55cc'; ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(name, rx, PAD.top + 2);
      ctx.restore();
    }

    // ★マーク
    ctx.font = 'bold 18px serif';
    ctx.fillStyle = '#ff2d55';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ff2d5577'; ctx.shadowBlur = 6;
    ctx.fillText('★', rx, ry);
    ctx.shadowBlur = 0;

    // 地域名ラベル
    ctx.font = 'bold 9px sans-serif';
    ctx.fillStyle = '#ff2d55';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(name, rx + 12, ry);
  });
}

function drawInfo() {
  const search = document.getElementById('search').value;
  const cnt = RAW.filter(d => activeRegions.has(d.r)).length;
  const modeLabel = scaleMode==='japan'?'面積（日本＝1.0）':'面積 (km²)';
  document.getElementById('info').textContent =
    '表示中: '+cnt+'カ国　X軸＝'+modeLabel+' — 対数スケール　Y軸＝人口（千人、UN2023推計）';
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawAxes();
  drawPoints();
  drawJapanLine();
  drawJpRegions();
  drawJapan();
  drawInfo();
}

// ---- ツールチップ ----
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const tip = document.getElementById('tooltip');

  // 日本地域の★チェック
  if (activeJpRegions.size > 0) {
    let found = null;
    activeJpRegions.forEach(name => {
      const reg = JP_REGIONS.find(r=>r.name===name);
      if (!reg) return;
      const [rx,ry] = toPixel(xVal(reg.area), Math.log10(reg.pop));
      if (Math.hypot(mx-rx, my-ry) < 16) found = reg;
    });
    if (found) {
      const ratio = found.area / JAPAN_AREA;
      const ratioStr = ratio>=1?ratio.toFixed(2)+'倍'
        :(ratio*100>=1)?(ratio*100).toFixed(2)+'%':(ratio*100).toFixed(4)+'%';
      const popStr = found.pop>=1000?(found.pop/1000).toFixed(2)+'百万人':found.pop.toFixed(0)+'千人';
      tip.innerHTML =
        '<div style="font-weight:800;font-size:14px;margin-bottom:4px;">★ '+found.name+'</div>'+
        '<div style="color:#ff2d55;font-size:10px;margin-bottom:8px;">日本の参照地域</div>'+
        '<div>📐 面積: <b>'+found.area.toLocaleString()+' km²</b></div>'+
        '<div style="margin-top:2px;">　　（日本比: <b>'+ratioStr+'</b>）</div>'+
        '<div style="margin-top:4px;">👥 人口: <b>'+popStr+'</b></div>';
      tip.style.display = 'block';
      tip.style.left = (e.clientX+14)+'px';
      tip.style.top  = (e.clientY-10)+'px';
      canvas.style.cursor = 'pointer';
      return;
    }
  }

  // 国データのツールチップ
  const search = document.getElementById('search').value;
  const filtered = RAW.filter(d => activeRegions.has(d.r));
  let closest = null, minDist = 12;
  filtered.forEach(d => {
    const lx = xVal(d.a);
    const ly = Math.log10(Math.max(d.p, 0.5));
    const [px,py] = toPixel(lx, ly);
    const dist = Math.hypot(mx-px, my-py);
    if (dist < minDist) { minDist = dist; closest = d; }
  });

  if (closest) {
    const d = closest;
    const p = d.p>=1000000?(d.p/1000000).toFixed(2)+'億人':d.p>=1000?(d.p/1000).toFixed(2)+'百万人':d.p.toFixed(0)+'千人';
    const ratio = d.a / JAPAN_AREA;
    const aStr = scaleMode==='japan'
      ? '面積: '+(ratio>=1?ratio.toFixed(2)+'倍':(ratio*100>=1)?(ratio*100).toFixed(2)+'%':(ratio*100).toFixed(4)+'%')+
        '（'+d.a.toLocaleString()+' km²）'
      : '面積: '+d.a.toLocaleString()+' km²';
    tip.innerHTML =
      '<div style="font-weight:800;font-size:14px;margin-bottom:4px;">'+d.n+'（'+d.r+'）</div>'+
      '<div>'+aStr+'</div>'+
      '<div style="margin-top:4px;">👥 人口: <b>'+p+'</b></div>';
    tip.style.display = 'block';
    tip.style.left = (e.clientX+14)+'px';
    tip.style.top  = (e.clientY-10)+'px';
    canvas.style.cursor = 'crosshair';
  } else {
    tip.style.display = 'none';
    canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('mouseleave', () => {
  document.getElementById('tooltip').style.display = 'none';
});

// クリックで国を選択/解除
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // 日本地域★のクリックは無視
  let jpHit = false;
  activeJpRegions.forEach(name => {
    const reg = JP_REGIONS.find(r=>r.name===name);
    if (!reg) return;
    const [rx,ry] = toPixel(xVal(reg.area), Math.log10(reg.pop));
    if (Math.hypot(mx-rx, my-ry) < 16) jpHit = true;
  });
  if (jpHit) return;

  // 最も近い国を探す
  let closest = null, minDist = 12;
  RAW.forEach(d => {
    if (!activeRegions.has(d.r)) return;
    if (d.n === '日本') return;
    const lx = xVal(d.a);
    const ly = Math.log10(Math.max(d.p, 0.5));
    const [px,py] = toPixel(lx, ly);
    const dist = Math.hypot(mx-px, my-py);
    if (dist < minDist) { minDist = dist; closest = d; }
  });

  // 日本★のクリック判定
  const japan = RAW.find(d=>d.n==='日本');
  if (japan && activeRegions.has('アジア')) {
    const [jx,jy] = toPixel(xVal(japan.a), Math.log10(japan.p));
    if (Math.hypot(mx-jx, my-jy) < 16) {
      if (selectedCountries.has('日本')) selectedCountries.delete('日本');
      else selectedCountries.add('日本');
      draw(); return;
    }
  }

  if (closest) {
    if (selectedCountries.has(closest.n)) selectedCountries.delete(closest.n);
    else selectedCountries.add(closest.n);
    draw();
  }
});

// ---- インフォカード ----
function buildCards() {
  const el = document.getElementById('cards');
  const maxArea  = RAW.reduce((a,b) => a.a>b.a?a:b);
  const maxPop   = RAW.reduce((a,b) => a.p>b.p?a:b);
  const minArea  = RAW.reduce((a,b) => a.a<b.a?a:b);
  const minPop   = RAW.reduce((a,b) => a.p<b.p?a:b);
  const cards = [
    ['🌍','総加盟国数', RAW.length+'カ国'],
    ['📐','最大面積', maxArea.n+' '+maxArea.a.toLocaleString()+' km²'],
    ['👥','最多人口', maxPop.n+' '+(maxPop.p/1000).toFixed(0)+'百万人'],
    ['🔬','最小面積', minArea.n+' '+minArea.a+' km²'],
  ];
  cards.forEach(([icon,title,val]) => {
    const d = document.createElement('div');
    d.style.cssText = 'background:#0d1528;border:1px solid #1e293b;border-radius:8px;padding:4px 12px;text-align:center;min-width:160px;';
    d.innerHTML = '<div style="font-size:14px;">'+icon+'</div>'+
                  '<div style="font-size:9px;color:#475569;">'+title+'</div>'+
                  '<div style="font-size:11px;font-weight:700;color:#e2e8f0;">'+val+'</div>';
    el.appendChild(d);
  });
}

// ---- 初期化 ----
buildUI();
buildCards();
resize();
window.addEventListener('resize', resize);
